[[exercises]]
id = "01-movement/01-basic-motion"
title = "Basic Motion"
category = "Movement"
difficulty = 1
notes = "MNEMONIC: h is leftmost, l is rightmost, j hangs down, k points up"
instructions = """
Each line below contains a word marked with brackets [like this].
Your goal: delete ONLY the bracketed word (including brackets).

Steps for each line:
1. Use h/j/k/l to move your cursor onto the [ character
2. Press  v  to enter select mode
3. Use  l  to extend your selection to include the ]
4. Press  d  to delete

Do NOT use w, b, f, or any other motion — only h, j, k, l.
"""
hints = [
  "Position cursor on [, press v, then l repeatedly until ] is included in the selection, then d.",
  "Remember: in Helix, motions CREATE selections. So just moving with h/j/k/l already selects the character under the cursor. v extends it as you move.",
]

[[exercises.commands]]
key = "h"
description = "Move left"

[[exercises.commands]]
key = "j"
description = "Move down"

[[exercises.commands]]
key = "k"
description = "Move up"

[[exercises.commands]]
key = "l"
description = "Move right"

[[exercises]]
id = "01-movement/02-word-motion"
title = "Word Motion"
category = "Movement"
difficulty = 1
notes = """
MNEMONIC: w=word, b=back, e=end. Uppercase = WORD (whitespace-delimited)

NOTE: In Helix, w selects from cursor to the start of the next word.
      This means pressing w then d deletes a word — select, then act!
"""
instructions = """
Delete every other word to transform each sentence.
Use  w  to select a word, then  d  to delete it.

Tip: After deleting, you may need to also delete the extra space.
Try  w d  for each word you want to remove.
"""
hints = [
  "Position at start of \"two\", press w to select it, then d to delete. You'll also need to handle the space.",
  "Try selecting the word AND the following space before deleting: w on the word, then l to extend into the space, then d.",
  "Alternative approach — use v to enter select mode, then w to extend across the word + space, then d.",
]

[[exercises.commands]]
