[[exercises]]
id = "15-combined-techniques/01-rename-variable"
title = "Rename Variable"
category = "Combined Techniques"
difficulty = 3
notes = """
THE HELIX WAY: Select all, then act on all at once.

WORKFLOW
--------
  The Helix pattern for global find-and-replace:

  % s <pattern> Enter c <replacement> Esc

  1. %           Select entire file
  2. s           Open regex select (split into sub-selections)
  3. <pattern>   Type the text to find
  4. Enter       Confirm — now every match is a separate selection
  5. c           Change all selections simultaneously
  6. <type>      Type the replacement text
  7. Esc         Done — all instances changed at once

  This replaces Vim's  :%s/old/new/g
"""
instructions = """
Rename the variable "count" to "total" everywhere in this code.
Use the workflow above: % s count Enter c total Esc
"""
hints = [
  "Select all practice text (use x repeatedly or v+motion).",
  "Press s, type \"count\", press Enter.",
  "You should see 5 selections highlighting each \"count\".",
  "Press c, type \"total\", press Esc. All 5 change at once.",
  "Note: this also changes \"count\" inside the string. For real code, use Space r (LSP rename) instead!",
]

[[exercises.commands]]
key = "% s <pattern> Enter c <replacement> Esc"
description = "The Helix pattern for global find-and-replace"

