[[exercises]]
id = "11-registers/04-append-to-register"
title = "Append to Register"
category = "Registers"
difficulty = 3
notes = """
A lowercase register name OVERWRITES — every yank to "ay
replaces what was there. An UPPERCASE register name APPENDS,
so successive yanks to "Ay accumulate.

This is how you collect scattered pieces of text from a buffer
into a single register without losing earlier yanks.
"""
instructions = """
Collect every TODO comment line from the function into register
A, then paste the collected list at the PASTE HERE marker.

Workflow:
1. Move to the first TODO line; press  x  to select the whole line
2. Press  " A y  to APPEND the line to register a
   (capital A is the magic — lowercase a would overwrite)
3. Move to the next TODO line; press  x  again
4. Press  " A y  again — second line is appended
5. Repeat for the third TODO
6. Move to the line after "PASTE HERE:"
7. Press  " a p  to paste the accumulated register a
"""
hints = [
  "x selects the current line including its newline. That's what you want — appending the newline keeps each TODO on its own line in the register.",
  "Capital A is *append* to register a. Capital B appends to register b. The capital letter doesn't create a new register — it just changes the yank semantics.",
  "Paste with lowercase: \" a p (read the contents of register a). The capital is only for *writing*.",
  "If you accidentally use lowercase a for one of the yanks, the register gets overwritten and you lose the earlier TODOs. Press u and start that yank over.",
]

[[exercises.commands]]
key = "\"Ay"
description = "Yank and APPEND to register a"

[[exercises.commands]]
key = "\"ap"
description = "Paste contents of register a"

[[exercises.commands]]
key = "x"
description = "Select current line"

