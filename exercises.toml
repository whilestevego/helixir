[[exercises]]
id = "15-combined-techniques/05-vim-to-helix"
title = "Vim to Helix Translation"
category = "Combined Techniques"
difficulty = 3
notes = """
THE KEY MENTAL SHIFT: Vim = action first, Helix = selection first.

VIM -> HELIX TRANSLATION TABLE
------------------------------
  Vim    Helix    Action
  dw     wd       Delete word
  dd     xd       Delete line
  yy     xy       Yank line
  ci"    mi"c     Change inside quotes
  ca(    ma(d     Delete around parens
  >>     x>       Indent line
  Vj     xx       Select two lines
  :%s    %s       Select-all + regex select
"""
instructions = """
Fill in the Helix equivalent for each Vim command.
Then perform the actual edit described on the text below.
"""
hints = [
  "The pattern is: Vim's di/ci/da -> Helix's mi/ma + action. Vim: d(action) i(inside) w(object). Helix: m(match) i(inside) w(object) d(action)",
  "Surround operations: Vim cs\"' -> Helix mr\"' (m=match, r=replace surround)",
  "For the practice edits: navigate to \"DELETEME\", use miwd (match inside word, delete).",
  "For config(\"old\"): put cursor inside quotes, mi\"c then type \"new\", Esc.",
]

[[exercises.commands]]
