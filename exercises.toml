[[exercises]]
id = "02-selection/02-extend-mode"
title = "Extend Mode"
category = "Selection"
difficulty = 1
notes = """
In select mode, ALL motions EXTEND the selection instead of
replacing it. This is like Vim's visual mode but integrated
into Helix's selection-first model.
"""
instructions = """
Each line has a phrase enclosed in << >> markers.
Select from << to >> (inclusive) using extend mode, then delete.

Strategy:
1. Position cursor on the first <
2. Press v to enter extend mode
3. Use f > to reach the first >, then l to extend past >>
4. Press d to delete

The result should have no << >> markers or their contents.
"""
hints = [
  "Move to <, press v, then f > to jump to the first >. But you need to include the second > too.",
  "After f >, press l to extend one more character to include the closing >, then d.",
  "Alternative: f < to land on first <, then v f > l d.",
  "Another approach: use / to search for <<.*?>> pattern, but that's a more advanced technique.",
]

[[exercises.commands]]
key = "v"
description = "Enter select (extend) mode"

[[exercises.commands]]
key = "v"
description = "Press again to exit back to normal mode"

[[exercises.commands]]
key = "Esc"
description = "Also exits select mode"

[[exercises]]
id = "02-selection/03-collapse-and-flip"
title = "Collapse and Flip"
category = "Selection"
difficulty = 1
notes = """
In Helix, every cursor is a selection with an anchor and a head.
  ;  collapses the selection to just the cursor position.
  Alt-;  swaps which end is the anchor and which is the head.
"""
instructions = """
This exercise practices the "select then refine" workflow.

Each line has two words in CAPS. Delete ONLY the second one.

Strategy:
1. Use / to search for a CAPS word (or navigate manually)
2. If you accidentally select too much, use ; to collapse
   and try again
3. Select precisely the second CAPS word, then d

This teaches you to use ; as a "reset" when your selection
goes wrong — a crucial habit in Helix.
"""
hints = [
  "On the first line, navigate to LAZY. Press w to select the word, then d to delete it.",
  "If you overshoot and select too much, press ; to collapse back to a cursor and start over.",
  "The key habit: ; is your \"undo selection\" — use it freely whenever you need to restart a selection.",
]

[[exercises.commands]]
key = ";"
description = "Collapse selection to a single cursor"

[[exercises.commands]]
key = "Alt-;"
description = "Flip selection (swap anchor and cursor)"

