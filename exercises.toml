[[exercises]]
id = "12-macros/04-macro-with-search"
title = "Macro with Search"
category = "Macros"
difficulty = 3
notes = """
Macros that include a / search are powerful: each replay jumps
to the next match before performing the transformation, so a
single macro can sweep through an entire file without manual
positioning between replays.

Surrounding pairs (ms<char>) is from the surround module — it
wraps the current selection with the given character pair.
"""
instructions = """
Wrap every URL in angle brackets so they become Markdown
autolinks: http://example.com  →  <http://example.com>

Workflow:
1. Press  Q  to start recording into the default macro register
2. Press  /  to open the search prompt
3. Type   http\\S+   and press Enter
   (\\S+ matches one-or-more non-whitespace characters — the URL)
4. Press  m s <  to surround the selected URL with < and >
5. Press  q  to stop recording
6. Press  @  three times — each replay finds the next URL and
   wraps it
"""
hints = [
  "The search inside the macro is the trick. Each replay re-runs the search, so the cursor naturally advances from one URL to the next without you tracking position.",
  "ms< wraps the current selection with matching pair < and >. The current selection after the search IS the URL, so surround acts directly on it.",
  "If you forget the leading h or end up surrounding the wrong thing, press u to undo, then re-record. Macros are throwaway — record, replay, discard.",
  "Counted replay: 3@ runs the macro 3 times in a row instead of pressing @ three times. Useful when you know the count up front.",
]

