description = "Move to next WORD start (ignores punctuation)"

[[exercises.commands]]
key = "B"
description = "Move to previous WORD start"

[[exercises.commands]]
key = "E"
description = "Move to next WORD end"

[[exercises]]
id = "01-movement/03-find-and-till"
title = "Find and Till"
category = "Movement"
difficulty = 1
notes = """
NOTE: Unlike Vim, these work ACROSS LINES in Helix!

MNEMONIC: f=find (on it), t=till (before it)
"""
instructions = """
Each line has content between pipe | characters.
Delete the content BETWEEN the pipes, keeping the pipes.

Strategy:
1. Move cursor to the first |
2. Press  t |  to select till the next pipe (but not the pipe)
3. Wait — that selects the | too. Instead: move one right with l
4. Then  t |  to select up to (but not including) the next |
5. Press  d  to delete
"""
hints = [
  "Position cursor on the first |, then press l to move one character right (onto the content to delete).",
  "Now press t | — this selects from cursor to just before the closing |.",
  "Press d to delete the selection. The pipes remain.",
  "Alternatively, use m i | (match inside vertical bars) which is covered in the text objects module. If you already know it, feel free to use it!",
]

[[exercises.commands]]
key = "f <char>"
description = "Find next occurrence of char (lands ON the char)"

[[exercises.commands]]
key = "F <char>"
description = "Find previous occurrence of char"

[[exercises.commands]]
key = "t <char>"
description = "Till next occurrence of char (lands BEFORE the char)"

[[exercises.commands]]
key = "T <char>"
description = "Till previous occurrence of char"

[[exercises.commands]]
key = "Alt-."
description = "Repeat the last f/t/F/T motion"

