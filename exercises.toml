  "On \"Buy groceries\", press I to enter insert mode at line start. Type \"DONE: \" then Esc.",
  "Press j to move down, then . to repeat.",
  "The . command repeats your last insert — the \"DONE: \" text gets inserted at the cursor position.",
  "If . inserts in the wrong place, try I then Esc first to position correctly, then . on subsequent lines.",
]

